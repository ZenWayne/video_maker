version: '3.8'

# 生产环境部署配置
# 使用方式: FRONTEND_IMAGE=xxx BACKEND_IMAGE=yyy podman-compose up -d

services:
  nginx:
    image: nginx:alpine
    container_name: video-maker-nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - video-maker-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/nginx-health"]
      interval: 10s
      timeout: 3s
      retries: 3

  frontend:
    image: ${FRONTEND_IMAGE:-localhost/video-maker-frontend:latest}
    container_name: video-maker-frontend
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
      - NEXT_PUBLIC_API_BASE=/api
    networks:
      - video-maker-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

  backend:
    image: ${BACKEND_IMAGE:-localhost/video-maker-backend:latest}
    container_name: video-maker-backend
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/workspace
      - APP_ENV=production
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=sqlite+aiosqlite:///workspace/data/production.db
      - LOG_LEVEL=info
      - CORS_ORIGINS=http://localhost,http://127.0.0.1,http://nginx
    volumes:
      - backend_data:/workspace/data
      - backend_storage:/workspace/storage
      - backend_logs:/workspace/logs
    depends_on:
      - redis
    networks:
      - video-maker-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:7-alpine
    container_name: video-maker-redis
    volumes:
      - redis_data:/data
    networks:
      - video-maker-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  worker:
    image: ${BACKEND_IMAGE:-localhost/video-maker-backend:latest}
    container_name: video-maker-worker
    command: ["python", "-m", "arq", "worker.WorkerSettings"]
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/workspace
      - APP_ENV=production
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=sqlite+aiosqlite:///workspace/data/production.db
      - LOG_LEVEL=info
    volumes:
      - backend_data:/workspace/data
      - backend_storage:/workspace/storage
      - backend_logs:/workspace/logs
    depends_on:
      - redis
      - backend
    networks:
      - video-maker-network
    restart: unless-stopped

volumes:
  backend_data:
  backend_storage:
  backend_logs:
  redis_data:

networks:
  video-maker-network:
    driver: bridge
