# Dev backend stack — start with:
#   make config    (write deploy/config.yml → deploy/config.env)
#   make secrets   (write deploy/secrets.yml → deploy/secrets/)
#   make dev       (runs both automatically, then starts all containers)

services:
  redis:
    image: redis:7-alpine
    container_name: video-maker-redis-dev
    ports:
      - "6381:6379"
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile.worker
    image: video-maker-backend-dev
    container_name: video-maker-backend-dev
    ports:
      - "8002:8002"
    volumes:
      - ../backend:/app:z
      - uv-cache:/root/.cache/uv
      - backend-venv:/app/.venv
      - ./secrets/gcp-sa.json:/run/secrets/gcp-sa.json:ro,z
    secrets:
      - gemini_api_key
      - veo_api_key
      - kie_api_key
      - deepseek_api_key
    env_file:
      - path: ./config.env
        required: true
    working_dir: /app
    environment:
      REDIS_URL: redis://video-maker-redis-dev:6379
      DATABASE_URL: sqlite+aiosqlite:////app/data/dev.db
      GOOGLE_APPLICATION_CREDENTIALS: /run/secrets/gcp-sa.json
      HTTP_PROXY: http://host.containers.internal:10809
      HTTPS_PROXY: http://host.containers.internal:10809
      http_proxy: http://host.containers.internal:10809
      https_proxy: http://host.containers.internal:10809
    command: >
      sh -c "export GEMINI_API_KEY=$(cat /run/secrets/gemini_api_key) &&
             export VEO_API_KEY=$(cat /run/secrets/veo_api_key) &&
             export KIE_API_KEY=$(cat /run/secrets/kie_api_key) &&
             export DEEPSEEK_API_KEY=$(cat /run/secrets/deepseek_api_key) &&
             uv run --project . uvicorn app.main:app --host 0.0.0.0 --port 8002
             --reload --reload-dir /app/app --reload-dir /app/worker"
    depends_on:
      - redis
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    image: video-maker-worker-dev
    container_name: video-maker-worker-dev
    volumes:
      - ../backend:/app:z
      - uv-cache:/root/.cache/uv
      - backend-venv:/app/.venv
      - ./secrets/gcp-sa.json:/run/secrets/gcp-sa.json:ro,z
    secrets:
      - gemini_api_key
      - veo_api_key
      - kie_api_key
      - deepseek_api_key
    env_file:
      - path: ./config.env
        required: true
    working_dir: /app
    environment:
      REDIS_URL: redis://video-maker-redis-dev:6379
      DATABASE_URL: sqlite+aiosqlite:////app/data/dev.db
      GOOGLE_APPLICATION_CREDENTIALS: /run/secrets/gcp-sa.json
      HTTP_PROXY: http://host.containers.internal:10809
      HTTPS_PROXY: http://host.containers.internal:10809
      http_proxy: http://host.containers.internal:10809
      https_proxy: http://host.containers.internal:10809
    command: >
      sh -c "export GEMINI_API_KEY=$(cat /run/secrets/gemini_api_key) &&
             export VEO_API_KEY=$(cat /run/secrets/veo_api_key) &&
             export KIE_API_KEY=$(cat /run/secrets/kie_api_key) &&
             export DEEPSEEK_API_KEY=$(cat /run/secrets/deepseek_api_key) &&
             uv run --project . python -m arq worker.arq_worker.WorkerSettings"
    depends_on:
      - redis
    restart: unless-stopped

  vc-worker:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.vc-worker
    image: video-maker-vc-worker-dev
    container_name: video-maker-vc-worker-dev
    volumes:
      - ../backend:/app:z
      - uv-cache:/root/.cache/uv
      - backend-venv:/app/.venv
    env_file:
      - path: ./config.env
        required: true
    working_dir: /app
    environment:
      REDIS_URL: redis://video-maker-redis-dev:6379
      DATABASE_URL: sqlite+aiosqlite:////app/data/dev.db
      PYTHONPATH: /usr/local/lib/python3.12/site-packages
    command: >
      uv run --project . python -m arq worker.vc_arq_worker.VcWorkerSettings
    depends_on:
      - redis
    restart: unless-stopped

  playwright:
    image: mcr.microsoft.com/playwright:v1.41.0-jammy
    container_name: video-maker-playwright
    network_mode: host
    command: npx playwright@1.41.0 run-server --port 3003 --host 0.0.0.0
    restart: unless-stopped

  frontend:
    image: node:20-slim
    container_name: video-maker-frontend-dev
    ports:
      - "4000:4000"
    volumes:
      - ../frontend-vite:/app:z
    working_dir: /app
    environment:
      BACKEND_URL: http://video-maker-backend-dev:8002
    # node_modules must exist on host before starting (run: cd frontend-vite && npm install)
    command: npm run dev -- --host 0.0.0.0
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  uv-cache:
  backend-venv:  # isolated venv for containers (avoids conflict with host uv)

secrets:
  gemini_api_key:
    file: ./secrets/gemini_api_key  # written by: make secrets
  veo_api_key:
    file: ./secrets/veo_api_key  # written by: make secrets
  kie_api_key:
    file: ./secrets/kie_api_key  # written by: make secrets
  deepseek_api_key:
    file: ./secrets/deepseek_api_key  # written by: make secrets
