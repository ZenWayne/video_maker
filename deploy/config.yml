# Application configuration — non-secret, like a K8s ConfigMap.
# Committed to git. Apply with: make config
#
# Each key becomes an env var in backend/worker containers.
# Overrides any host-injected proxy env vars (podman auto-injects lowercase variants).

# Gemini model selection
GEMINI_SCRIPT_MODEL: gemini-3.1-pro-preview
GEMINI_DIRECTOR_MODEL: gemini-3.1-pro-preview

# Veo video generation (via Vertex AI)
# Provider: "vertex" (Veo via Vertex AI / Google) or "kie" (kie.ai REST). Default vertex.
VIDEO_PROVIDER: vertex
VEO_MODEL: veo-3.1-fast-generate-001
VEO_POLL_INTERVAL_SECONDS: "10"
VEO_MAX_WAIT_SECONDS: "300"

# Worker
WORKER_POOL_SIZE: "4"

# Voice conversion (in-process vc2.VoiceConverter)
MODEL_DIR: "/workspace/exported_vc2"
VC_NUM_THREADS: "4"

# CORS — include both Vite dev and production origins
CORS_ORIGINS: "http://localhost:3000,http://127.0.0.1:3000,http://localhost:4000,http://127.0.0.1:4000"

# Langfuse (LLM observability)
# Keys are secrets (langfuse_public_key / langfuse_secret_key). Host + enabled
# flag are non-secret. Set LANGFUSE_ENABLED=true once keys are in secrets.yml.
# Host points at the self-hosted Langfuse running on the host machine.
LANGFUSE_ENABLED: "true"
LANGFUSE_HOST: "https://us.cloud.langfuse.com"
